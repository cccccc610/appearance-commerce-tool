<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>外观商业化思考小工具 - 预览入口</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 600px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 { color: #1e293b; margin-bottom: 10px; font-size: 1.8rem; }
        .subtitle { color: #64748b; margin-bottom: 30px; }
        .btn {
            display: inline-block;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
            padding: 16px 40px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 600;
            font-size: 1.1rem;
            transition: transform 0.2s, box-shadow 0.2s;
            margin: 10px;
        }
        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(99,102,241,0.4);
        }
        .info {
            margin-top: 30px;
            padding: 20px;
            background: #f1f5f9;
            border-radius: 12px;
            text-align: left;
        }
        .info h3 { color: #334155; margin-bottom: 10px; }
        .info p { color: #64748b; font-size: 0.95rem; line-height: 1.6; }
        .icon { font-size: 60px; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">🎨</div>
        <h1>外观商业化思考小工具</h1>
        <p class="subtitle">面向美术策划运营复合型岗位 v2.0</p>
        
        <a href="./index.html" class="btn">🚀 打开工具</a>
        
        <div class="info">
            <h3>💡 使用说明</h3>
            <p>
                1. 点击上方按钮打开工具<br>
                2. 选择游戏品类（MOBA/FPS/模拟经营）<br>
                3. 选择外观类型<br>
                4. 查看竞品分析、美术内容、运营策略<br>
                5. 完成风险检查<br>
                6. 生成并下载报告
            </p>
        </div>
    </div>
</body>
</html>
